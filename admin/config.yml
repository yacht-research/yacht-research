backend:
  name: github
  repo: yacht-research/yacht-research
  branch: main
  base_url: https://delicate-snowflake-ff71.mathis-yachtbroker.workers.dev

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: yachts
    label: Yachts
    folder: content/yachts
    create: true
    slug: "{{slug}}"
    format: json
    extension: json
    fields:
      - { label: Title, name: title, widget: string }
      - label: Badge
        name: badge
        widget: select
        options: ["For Sale", "Off-Market", "New Listing", "Charter", "Price Reduced", "Sold"]
      - { label: Length, name: length, widget: string, hint: "ex: 42m" }
      - { label: Year Built, name: year, widget: string }
      - { label: Location, name: location, widget: string }
      - { label: Price, name: price, widget: string, hint: "ex: Price on Request ou € 2,800,000" }
      - { label: Image, name: image, widget: image, hint: "Glisse une photo ou colle une URL" }
      - { label: Brochure URL, name: brochure, widget: string, required: false, hint: "Lien Google Drive PDF" }
      - { label: Published, name: published, widget: boolean, default: true }

  - name: settings
    label: Settings
    files:
      - label: Hero
        name: hero
        file: content/hero.json
        format: json
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string }
          - { label: Title Line 1, name: title_line1, widget: string }
          - { label: Title Line 2 (italic), name: title_line2, widget: string }
          - { label: Subtitle, name: subtitle, widget: string }
          - { label: Hero Image URL, name: hero_image, widget: string }
