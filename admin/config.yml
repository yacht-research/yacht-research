backend:
  name: github
  repo: yacht-research/yacht-research
  branch: main
  base_url: https://delicate-snowflake-ff71.mathis-yachtbroker.workers.dev

media_folder: images/uploads
public_folder: /images/uploads

collections:

  # ── YACHTS ──────────────────────────────────────────────
  - name: yachts
    label: "🛥 Yachts"
    folder: content/yachts
    create: true
    slug: "{{slug}}"
    format: json
    extension: json
    fields:
      - { label: Title, name: title, widget: string }
      - label: Badge
        name: badge
        widget: select
        options: ["For Sale", "Off-Market", "New Listing", "Charter", "Price Reduced", "Sold"]
      - { label: Length, name: length, widget: string, hint: "ex: 42m" }
      - { label: Year Built, name: year, widget: string }
      - { label: Location, name: location, widget: string }
      - { label: Price, name: price, widget: string, hint: "ex: Price on Request ou € 2,800,000" }
      - { label: Image, name: image, widget: image }
      - { label: Brochure URL, name: brochure, widget: string, required: false, hint: "Lien Google Drive PDF" }
      - { label: Published, name: published, widget: boolean, default: true }

  # ── PAGES ───────────────────────────────────────────────
  - name: settings
    label: "⚙️ Site Content"
    files:

      # HERO
      - label: "🏠 Hero (Accueil)"
        name: hero
        file: content/hero.json
        format: json
        fields:
          - { label: Eyebrow (villes), name: eyebrow, widget: string }
          - { label: "Titre ligne 1", name: title_line1, widget: string }
          - { label: "Titre ligne 2 (italic doré)", name: title_line2, widget: string }
          - { label: Sous-titre, name: subtitle, widget: string }
          - { label: Image de fond, name: hero_image, widget: image }
          - { label: "Bouton 1 (texte)", name: btn1_text, widget: string, default: "Explore Yachts" }
          - { label: "Bouton 2 (texte)", name: btn2_text, widget: string, default: "Charter a Yacht" }
          - { label: "Bouton 3 (texte)", name: btn3_text, widget: string, default: "Sell Your Yacht" }

      # WHY US
      - label: "⭐ Why Us"
        name: why
        file: content/why.json
        format: json
        fields:
          - { label: Label, name: label, widget: string, default: "Why Clients Choose Us" }
          - { label: "Titre ligne 1", name: title_line1, widget: string, default: "Strategic Access." }
          - { label: "Titre ligne 2 (italic doré)", name: title_line2, widget: string, default: "Stronger Results." }
          - { label: Paragraphe 1, name: para1, widget: text }
          - { label: Paragraphe 2, name: para2, widget: text }
          - { label: "Citation (italic doré)", name: quote, widget: string, required: false }
          - { label: Image, name: image, widget: image }
          - label: "Notre Expertise — Titre"
            name: expertise_title
            widget: string
            default: "A Complete Suite of Yachting Services"
            required: false
          - label: Services
            name: services
            widget: list
            required: false
            fields:
              - { label: Numéro, name: num, widget: string }
              - { label: Titre, name: title, widget: string }
              - { label: Description, name: desc, widget: text }

      # CHARTER
      - label: "⚓ Charter"
        name: charter
        file: content/charter.json
        format: json
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Sous-titre, name: subtitle, widget: text }
          - label: Destinations
            name: regions
            widget: list
            fields:
              - { label: Nom, name: name, widget: string }
              - { label: Sous-titre, name: sub, widget: string }
              - { label: Image, name: image, widget: image }

      # SERVICES
      - label: "🔧 Services"
        name: services
        file: content/services.json
        format: json
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Sous-titre, name: subtitle, widget: text }
          - label: Services
            name: items
            widget: list
            fields:
              - { label: Numéro, name: num, widget: string }
              - { label: Titre, name: title, widget: string }
              - { label: Description, name: desc, widget: text }

      # CONTACT
      - label: "📬 Contact"
        name: contact
        file: content/contact.json
        format: json
        fields:
          - { label: "Ville principale", name: city_main, widget: string, default: "Dubai, UAE" }
          - { label: "Ville Europe", name: city_eu, widget: string, default: "Paris, France" }
          - { label: Couverture globale, name: coverage, widget: string }
          - { label: Linktree URL, name: linktree, widget: string }

      # SEO
      - label: "🔍 SEO"
        name: seo
        file: content/seo.json
        format: json
        fields:
          - { label: "Titre de la page", name: title, widget: string }
          - { label: "Meta description", name: description, widget: text }
          - { label: "Image réseaux sociaux (OG)", name: og_image, widget: image }


      # BESPOKE / SERVICES
      - label: "✨ Bespoke Services"
        name: bespoke
        file: content/bespoke.json
        format: json
        fields:
          - { label: Titre, name: title, widget: string, default: "Beyond Brokerage" }
          - { label: Intro, name: intro, widget: text }
          - label: Services
            name: items
            widget: list
            fields:
              - { label: Titre, name: title, widget: string }
              - { label: Description, name: desc, widget: text }

      # PARTNERSHIPS
      - label: "🤝 Partnerships"
        name: partnerships
        file: content/partnerships.json
        format: json
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Types de partenariat
            name: types
            widget: list
            fields:
              - { label: Titre, name: title, widget: string }
              - { label: Description, name: desc, widget: text }

      # REFERRAL
      - label: "💰 Referral Programme"
        name: referral
        file: content/referral.json
        format: json
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Étapes
            name: steps
            widget: list
            fields:
              - { label: Numéro, name: num, widget: string }
              - { label: Titre, name: title, widget: string }
              - { label: Description, name: desc, widget: text }

      # RECRUITMENT
      - label: "👔 Recruitment"
        name: recruitment
        file: content/recruitment.json
        format: json
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Postes ouverts
            name: roles
            widget: list
            fields:
              - { label: Intitulé du poste, name: title, widget: string }

  # ── FORMULAIRE STANDALONE ────────────────────────────────
  - label: "📋 Formulaire Enquête"
    name: enquiry_form
    files:
      - label: "🔧 Paramètres du formulaire"
        name: form_settings
        file: content/form-settings.json
        format: json
        fields:
          - { label: "Titre onglet navigateur", name: page_title, widget: string, default: "Yacht Research — Enquiry Form" }
          - { label: "Favicon (URL ou chemin)", name: favicon, widget: string, default: "/favicon.ico" }
          - { label: "Logo texte (haut de page)", name: logo_text, widget: string, default: "Yacht Research" }
          - { label: "Titre principal ligne 1", name: hero_line1, widget: string, default: "Your Enquiry," }
          - { label: "Titre principal ligne 2 (italic doré)", name: hero_line2, widget: string, default: "Personally Handled" }
          - { label: "Sous-titre localisation", name: location_sub, widget: string, default: "Dubai · French Riviera · Mediterranean" }
