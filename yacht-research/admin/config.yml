backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: fr

collections:

  # ──────────────────────────────────────
  # HERO
  # ──────────────────────────────────────
  - name: "hero"
    label: "🏠 Page d'accueil — Hero"
    files:
      - name: "hero"
        label: "Section Hero"
        file: "content/hero.json"
        fields:
          - { label: "Accroche principale (ligne 1)", name: "title_line1", widget: "string", default: "The Art of" }
          - { label: "Accroche principale (ligne 2 — italique)", name: "title_line2", widget: "string", default: "Effortless Yachting" }
          - { label: "Sous-titre", name: "subtitle", widget: "string", default: "International yacht brokerage specializing in luxury yacht sales, charters, and private acquisitions" }
          - { label: "Ligne de destinations (ex: Dubai · Paris · Med)", name: "eyebrow", widget: "string", default: "Dubai · Paris · Mediterranean · Middle East · USA" }
          - { label: "Image de fond (URL)", name: "hero_image", widget: "image" }
          - { label: "Texte bouton 1", name: "btn1_text", widget: "string", default: "Explore Yachts" }
          - { label: "Texte bouton 2", name: "btn2_text", widget: "string", default: "Charter a Yacht" }
          - { label: "Texte bouton 3", name: "btn3_text", widget: "string", default: "Sell Your Yacht" }

  # ──────────────────────────────────────
  # WHY CLIENTS CHOOSE US
  # ──────────────────────────────────────
  - name: "why"
    label: "⭐ Pourquoi nous choisir"
    files:
      - name: "why"
        label: "Section Why Clients Choose Us"
        file: "content/why.json"
        fields:
          - { label: "Titre", name: "title", widget: "string", default: "Strategic Access. Stronger Results." }
          - { label: "Paragraphe 1", name: "para1", widget: "text" }
          - { label: "Paragraphe 2", name: "para2", widget: "text" }
          - { label: "Paragraphe 3 (citation)", name: "para3", widget: "text" }
          - { label: "Photo", name: "image", widget: "image" }
          - { label: "Stat — Chiffre", name: "stat_num", widget: "string", default: "5" }
          - { label: "Stat — Label", name: "stat_label", widget: "string", default: "Continents of Coverage" }

  # ──────────────────────────────────────
  # YACHTS FOR SALE
  # ──────────────────────────────────────
  - name: "yachts"
    label: "⛵ Yachts à vendre"
    label_singular: "Yacht"
    folder: "content/yachts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nom du yacht", name: "title", widget: "string" }
      - { label: "Badge (ex: For Sale / Off-Market / New Listing)", name: "badge", widget: "select", options: ["For Sale", "Off-Market", "New Listing", "Charter Available", "Price Reduced"] }
      - { label: "Photo principale", name: "image", widget: "image" }
      - { label: "Longueur (ex: 42m)", name: "length", widget: "string" }
      - { label: "Année de construction", name: "year", widget: "string" }
      - { label: "Localisation", name: "location", widget: "string" }
      - { label: "Prix (ex: € 2,800,000 ou Price on Request)", name: "price", widget: "string" }
      - { label: "Description courte", name: "description", widget: "text", required: false }
      - { label: "Publié", name: "published", widget: "boolean", default: true }

  # ──────────────────────────────────────
  # ABOUT
  # ──────────────────────────────────────
  - name: "about"
    label: "🏢 À propos"
    files:
      - name: "about"
        label: "Section About"
        file: "content/about.json"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Paragraphe 1", name: "para1", widget: "text" }
          - { label: "Paragraphe 2", name: "para2", widget: "text" }
          - { label: "Citation (encart doré)", name: "quote", widget: "string" }
          - { label: "Photo", name: "image", widget: "image" }
          - label: "Présences internationales"
            name: "presences"
            widget: "list"
            fields:
              - { label: "Ville", name: "city", widget: "string" }
              - { label: "Région / Label", name: "region", widget: "string" }

  # ──────────────────────────────────────
  # BESPOKE SERVICES
  # ──────────────────────────────────────
  - name: "bespoke"
    label: "💎 Services Bespoke"
    files:
      - name: "bespoke"
        label: "Section Bespoke Services"
        file: "content/bespoke.json"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Paragraphe intro 1", name: "para1", widget: "text" }
          - { label: "Paragraphe intro 2", name: "para2", widget: "text" }
          - { label: "Paragraphe intro 3", name: "para3", widget: "text" }
          - { label: "Citation finale (italique)", name: "quote", widget: "string" }
          - label: "Services (4 encarts)"
            name: "services"
            widget: "list"
            max: 4
            fields:
              - { label: "Titre du service", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  # ──────────────────────────────────────
  # REFERRAL
  # ──────────────────────────────────────
  - name: "referral"
    label: "💰 Programme Referral"
    files:
      - name: "referral"
        label: "Section Referral"
        file: "content/referral.json"
        fields:
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Paragraphe 1", name: "para1", widget: "text" }
          - { label: "Paragraphe 2", name: "para2", widget: "text" }
          - { label: "Paragraphe 3", name: "para3", widget: "text" }
          - label: "3 étapes"
            name: "steps"
            widget: "list"
            max: 3
            fields:
              - { label: "Titre de l'étape", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

  # ──────────────────────────────────────
  # CONTACT & COORDONNÉES
  # ──────────────────────────────────────
  - name: "contact"
    label: "📞 Contact & Coordonnées"
    files:
      - name: "contact"
        label: "Informations de contact"
        file: "content/contact.json"
        fields:
          - { label: "Email principal", name: "email", widget: "string" }
          - { label: "Téléphone", name: "phone", widget: "string" }
          - { label: "Ville principale", name: "city_main", widget: "string", default: "Dubai, UAE" }
          - { label: "Label ville principale", name: "city_main_label", widget: "string", default: "International Operations Hub" }
          - { label: "Bureau Europe", name: "city_eu", widget: "string", default: "Paris, France" }
          - { label: "Label bureau Europe", name: "city_eu_label", widget: "string", default: "Mediterranean & European Coverage" }
          - { label: "Couverture globale", name: "coverage", widget: "string", default: "Mediterranean · Middle East · Americas" }
          - { label: "Lien Linktree", name: "linktree", widget: "string", default: "https://linktr.ee/yacht_research" }

  # ──────────────────────────────────────
  # SEO & MÉTADONNÉES
  # ──────────────────────────────────────
  - name: "seo"
    label: "🔍 SEO & Métadonnées"
    files:
      - name: "seo"
        label: "SEO"
        file: "content/seo.json"
        fields:
          - { label: "Titre de la page", name: "title", widget: "string", default: "Yacht Research | The Art of Effortless Yachting" }
          - { label: "Description (Google)", name: "description", widget: "text" }
          - { label: "Mots-clés", name: "keywords", widget: "string" }
          - { label: "Logo (URL)", name: "logo_url", widget: "image", required: false }
